server:
  port: ${SERVER_PORT:8086}

spring:
  application:
    name: ms-calificaciones
    
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/base_de_datos_yb1c?currentSchema=calificaciones}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

ms:
  estudiantes:
    url: ${MS_ESTUDIANTES_URL:http://ms-estudiantes}
  asignaturas:
    url: ${MS_ASIGNATURAS_URL:http://ms-asignaturas}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /v3/api-docs

  swagger-ui:
    path: /swagger-ui.html