server:
  port: 8086

spring:
  application:
    name: ms-calificaciones
  datasource:
    url: jdbc:mysql://localhost:3306/db_calificaciones?createDatabaseIfNotExist=true
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

ms:
  estudiantes:
    url: http://ms-estudiantes
  asignaturas:
    url: http://ms-asignaturas

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/